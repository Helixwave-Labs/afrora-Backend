services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env
    # Ports removed for security: DB is only accessible within the container network
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    # Ports removed for security
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  api:
    build: .
    volumes:
      - static_data:/app/static
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    # Replacing script with direct command to avoid Windows CRLF issues
    # Simplify: Start server immediately to stop crash loop, then we will run init_db manually
    entrypoint: ["sh", "-c", "uvicorn app.interfaces.main:app --host 0.0.0.0 --port 8000"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
  redis_data:
  static_data: