services:
  # Commented out the local database service since we are using the external database URL from .env (Supabase)
  # To run database locally again, uncomment this section and the db dependency under api.
  # db:
  #   image: postgres:15-alpine
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data/
  #   env_file:
  #     - ./.env
  #   ports:
  #     - "5432:5432"
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    # Inline entrypoint to avoid CRLF line ending errors on Windows
    entrypoint: ["sh", "-c", "alembic upgrade head && exec uvicorn app.interfaces.main:app --host 0.0.0.0 --port 8000 --reload"]
    depends_on:
      # db:
      #   condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  # postgres_data:
  redis_data: